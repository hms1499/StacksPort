name: CI Build & Test

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Clean install dependencies
        run: npm install --no-cache

      - name: Verify SDK installed
        run: ls node_modules/@stacksport/dca-sdk/package.json

      - name: Check SDK version
        run: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('node_modules/@stacksport/dca-sdk/package.json','utf8'));console.log(p.version)"

      - name: Verify SDK importable
        run: node -e "import('@stacksport/dca-sdk').then(m=>console.log('SDK loaded, exports:',Object.keys(m))).catch(e=>{console.error(e);process.exit(1)})"

  build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Rebuild native bindings
        run: npm rebuild @tailwindcss/oxide

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
