<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      color: #e2e8f0;
      font-size: 12px;
      height: 36px;
      flex-shrink: 0;
    }
    #topbar .title { display: flex; align-items: center; gap: 6px; font-weight: 600; }
    #topbar .dot { width: 6px; height: 6px; border-radius: 50%; background: #408A71; }
    #open-tab-btn {
      background: #408A71; color: white; border: none; border-radius: 6px;
      padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
    }
    #open-tab-btn:hover { background: #4ea885; }

    #banner {
      display: none;
      padding: 8px 12px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
      color: #fbbf24;
      font-size: 11px;
      line-height: 1.4;
      flex-shrink: 0;
    }
    #banner.show { display: block; }
    #banner b { color: #f1f5f9; }

    #wrap { display: flex; flex-direction: column; height: 100%; }
    #frame-wrap { position: relative; flex: 1; }
    #app-frame { width: 100%; height: 100%; border: none; display: block; }

    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0f1117; color: #408A71; gap: 12px;
    }
    #loading svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="topbar">
      <div class="title">
        <span class="dot"></span>
        <span>StacksPort</span>
      </div>
      <button id="open-tab-btn" title="Open the full app in a new browser tab — required for wallet connection">Open in tab ↗</button>
    </div>

    <div id="banner">
      <b>Wallet connection requires a real browser tab.</b> Click <b>Open in tab</b> to connect Leather/Xverse there. Once connected, this side panel will refresh automatically.
    </div>

    <div id="frame-wrap">
      <div id="loading">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <span style="font-size:13px;color:#6b7280;">Loading StacksPort...</span>
      </div>
      <iframe id="app-frame" allow="clipboard-write; clipboard-read"></iframe>
    </div>
  </div>
  <script src="side_panel.js"></script>
</body>
</html>
