name: DCA Keeper Bot

on:
  schedule:
    # Chạy mỗi 10 phút (≈ 1 Stacks block)
    - cron: "*/10 * * * *"
  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:

jobs:
  run-keeper:
    name: Execute DCA Plans
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: keeper-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: keeper-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test failure alert
        run: exit 1

      - name: Run keeper bot
        env:
          KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          KEEPER_ADDRESS:     ${{ secrets.KEEPER_ADDRESS }}
          CONTRACT_ADDRESS:   SP2CMK69QNY60HBG8BJ4X5TD7XX2ZT4XB62V13SV
          CONTRACT_NAME:      dca-vault
          SWAP_ROUTER:        SP2CMK69QNY60HBG8BJ4X5TD7XX2ZT4XB62V13SV.bitflow-sbtc-swap-router
          HIRO_API_URL:       https://api.hiro.so
          MIN_AMOUNT_OUT:     "1"
        run: npm start

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚨 *DCA Keeper Bot FAILED*%0A%0A*Repo:* ${{ github.repository }}%0A*Run:* ${{ github.run_number }}%0A*Time:* $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
