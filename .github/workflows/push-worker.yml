name: Push Worker — Price Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: push-worker
  cancel-in-progress: false

jobs:
  run-push:
    name: Send price alert pushes
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: keeper-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: keeper-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run push worker (one-shot)
        env:
          VAPID_SUBJECT:            ${{ secrets.VAPID_SUBJECT }}
          VAPID_PUBLIC_KEY:         ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:        ${{ secrets.VAPID_PRIVATE_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: npm run push:once

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚨 *Push Worker FAILED*%0A%0A*Repo:* ${{ github.repository }}%0A*Run:* ${{ github.run_number }}%0A*Time:* $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
